jenkins:
  systemMessage: "Jenkins for 1C extension dump automation"
  numExecutors: 2
  mode: NORMAL
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_ID:-admin}"
  remotingSecurity:
    enabled: true

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "github-http"
              scope: GLOBAL
              username: "${GITHUB_USERNAME:-}"
              password: "${GITHUB_TOKEN:-}"
              description: "GitHub HTTP credentials for push"

jobs:
  - file: /usr/share/jenkins/ref/jobdsl/seed.groovy

unclassified:
  location:
    url: "${JENKINS_URL:-http://localhost:8080/}"
